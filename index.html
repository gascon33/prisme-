<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prism Clock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:Arial,sans-serif}
body{display:flex;align-items:center;justify-content:center}
#R{width:100vw;height:100vh;overflow:hidden}
input::-webkit-inner-spin-button{-webkit-appearance:none}
button,input{font:inherit}
</style>
</head>
<body>
<div id="R"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef } = React;
const e = React.createElement;
const S=60,M=60,H=24,BASE=380,BASE_SZ=10;
const gd=(s,n)=>180+(s%n)*(360/n);
const td=(i,n)=>180+i*(360/n)-(360/n)/2;
const tr=d=>d*Math.PI/180;
const pad=n=>String(n).padStart(2,'0');
function iB(n){const b=Array(n).fill(0);b[0]=1;b[1]=2;return b;}
function shiftBlock(bl,p,n){const nx=[...bl];for(let o=0;o<3;o++){const i=(p+o)%n;nx[i]=(nx[i]+2)%3;}return nx;}
function build(total){const sec=total%60,min=Math.floor(total/60)%60,hr=Math.floor(total/3600)%24;function ring(k,N){let b=iB(N);for(let i=0;i<k%N;i++)b=shiftBlock(b,i,N);return b;}return{total,sec,min,hr,sB:ring(sec,S),mB:ring(min,M),hB:ring(hr,H)};}
function getNow(){const d=new Date();return d.getHours()*3600+d.getMinutes()*60+d.getSeconds();}
function playTick(ctx,t,isM){const sr=ctx.sampleRate;[{l:.04,d:.008,v:isM?1:.7,g:.6,f:0,dt:0},{l:.035,d:.006,v:isM?.8:.5,g:.4,f:isM?2200:1800,dt:.04}].forEach(({l,d,v,g,f,dt})=>{const buf=ctx.createBuffer(1,sr*l,sr),ch=buf.getChannelData(0);for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1)*Math.exp(-i/(sr*d))*v;const src=ctx.createBufferSource();src.buffer=buf;const gn=ctx.createGain();gn.gain.value=g;if(f){const fl=ctx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=f;src.connect(fl);fl.connect(gn);}else src.connect(gn);gn.connect(ctx.destination);src.start(t+dt);});}
function verts(tx,ty,deg,sz){const a=tr(deg),ap=[tx+sz*Math.cos(a),ty+sz*Math.sin(a)];const bx=tx-sz*.5*Math.cos(a),by=ty-sz*.5*Math.sin(a);const px=Math.cos(a+Math.PI/2),py=Math.sin(a+Math.PI/2),hw=sz*Math.sqrt(3)/2;return[ap,[bx+hw*px,by+hw*py],[bx-hw*px,by-hw*py]];}

function Ring({n,R,bl,aL,aR,col,fA,sp,sr,sL,sR,nums,CX,CY,scale}){
  const els=[], sz=BASE_SZ*scale;
  for(let i=0;i<n;i++){
    const isA=i===aL||i===aR,base=td(i,n);
    let deg=base;
    if(sp===1&&i===sL)deg=base+sr;
    if(sp===2&&i===sR)deg=base+sr;
    const rad=tr(base),tx=CX+R*Math.cos(rad),ty=CY+R*Math.sin(rad);
    const v=verts(tx,ty,deg,sz),poly=v.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const idx=bl[i],b1=idx===0?v[1]:v[0],b2=idx===0?v[2]:idx===1?v[1]:v[2];
    const lx=(v[0][0]+v[1][0]+v[2][0])/3,ly=(v[0][1]+v[1][1]+v[2][1])/3;
    els.push(e('g',{key:i},
      e('polygon',{points:poly,fill:isA?fA:'#f2f2f2',stroke:isA?col:'#bbb',strokeWidth:Math.max(.5,1.2*scale)}),
      e('line',{x1:b1[0],y1:b1[1],x2:b2[0],y2:b2[1],stroke:isA?col:'#777',strokeWidth:Math.max(.7,(isA?2.2:1.2)*scale),strokeLinecap:'round'}),
      nums&&e('text',{x:lx,y:ly+.3,textAnchor:'middle',dominantBaseline:'middle',fontSize:Math.max(3.4,4*scale),fill:isA?col:'#bbb',fontWeight:isA?'bold':'normal'},i+1)
    ));
  }
  return els;
}

function useLayout(mode){
  const calc=()=>{
    const isMobile=window.innerWidth<700;
    const pad=12;
    const topButtons=isMobile?42:42;
    const manualBlock=mode==='manual'?(isMobile?62:58):0;
    const digitalBlock=isMobile?74:86;
    const topLabelsBlock=isMobile?24:28; // отдельный блок над часами
    const freeBlock=mode==='free'?(isMobile?46:46):0;
    const gaps=isMobile?24:28;
    const chrome=pad*2+topButtons+manualBlock+digitalBlock+topLabelsBlock+freeBlock+gaps;
    const availableW=window.innerWidth-pad*2-6;
    const availableH=window.innerHeight-chrome;
    const dim=Math.max(160,Math.min(availableW,availableH));
    return {dim,isMobile};
  };
  const [state,setState]=useState(calc);
  useEffect(()=>{
    const onResize=()=>setState(calc());
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[mode]);
  useEffect(()=>{setState(calc());},[mode]);
  return state;
}

function App(){
  const [mode,setMode]=useState('real');
  const {dim,isMobile}=useLayout(mode);
  const scale=dim/BASE;
  const W=dim,CX=dim/2,CY=dim/2;
  const SZ=BASE_SZ*scale;
  const RS=152*scale,RM=118*scale,RH=84*scale;
  const rBg=RS+SZ+12*scale;

  const [st,setSt]=useState(()=>build(getNow()));
  const [sp,setSp]=useState(0);
  const [sr,setSr]=useState(0);
  const [mH,setMH]=useState('12');
  const [mM,setMM]=useState('00');
  const [mS,setMS]=useState('00');
  const [run,setRun]=useState(false);
  const [snd,setSnd]=useState(true);
  const spR=useRef(null),tmR=useRef(null),psR=useRef(-1),acR=useRef(null),snR=useRef(true);
  useEffect(()=>{snR.current=snd;},[snd]);
  function getAC(){if(!acR.current||acR.current.state==='closed')acR.current=new(window.AudioContext||window.webkitAudioContext)();if(acR.current.state==='suspended')acR.current.resume();return acR.current;}
  function pt(isM){if(!snR.current)return;try{const c=getAC();playTick(c,c.currentTime,isM);}catch(err){}}
  function spin(getT){cancelAnimationFrame(spR.current);const next=getT();pt(next%60===0);setSp(1);setSr(0);let t0=null;const p1=ts=>{if(!t0)t0=ts;const t=Math.min((ts-t0)/300,1);setSr(t*120);if(t<1){spR.current=requestAnimationFrame(p1);return;}setSp(2);setSr(0);let t1=null;const p2=ts2=>{if(!t1)t1=ts2;const t2=Math.min((ts2-t1)/300,1);setSr(t2*120);if(t2<1){spR.current=requestAnimationFrame(p2);return;}setSp(0);setSr(0);setSt(build(next));};spR.current=requestAnimationFrame(p2);};spR.current=requestAnimationFrame(p1);}
  useEffect(()=>{if(mode!=='real')return;psR.current=-1;const id=setInterval(()=>{const t=getNow(),s=t%60;if(s!==psR.current){psR.current=s;spin(()=>getNow());}},200);return()=>{clearInterval(id);cancelAnimationFrame(spR.current);setSp(0);};},[mode]);
  function stop(){clearTimeout(tmR.current);cancelAnimationFrame(spR.current);setSp(0);setSr(0);setRun(false);}
  function start(from){setRun(true);let cur=from;const w0=Date.now();function loop(){const el=Date.now()-w0,dl=(Math.floor(el/1000)+1)*1000-el;tmR.current=setTimeout(()=>{cur++;spin(()=>cur);loop();},dl);}loop();}
  function apply(){stop();const h=Math.min(23,Math.max(0,parseInt(mH)||0));const m=Math.min(59,Math.max(0,parseInt(mM)||0));const s=Math.min(59,Math.max(0,parseInt(mS)||0));setSt(build(h*3600+m*60+s));}
  function tog(){if(run)stop();else start(st.total);}
  function sw(m){stop();setMode(m);if(m==='real')setSt(build(getNow()));}
  useEffect(()=>()=>{clearTimeout(tmR.current);cancelAnimationFrame(spR.current);},[]);

  const {sec,min,hr,sB:sb,mB:mb,hB:hb}=st;
  const sL=sec,sR=(sec+1)%S,mL=min,mR=(min+1)%M,hL=hr,hR=(hr+1)%H;
  const sA=tr(gd(sec,S)),mA=tr(gd(min,M)),hA=tr(gd(hr,H));
  const isDay=hr>=6&&hr<18;
  const x6=CX+rBg*Math.cos(tr(270)),y6=CY+rBg*Math.sin(tr(270));
  const x18=CX+rBg*Math.cos(tr(90)),y18=CY+rBg*Math.sin(tr(90));

  const topBtn={padding:isMobile?'6px 10px':'6px 12px',borderRadius:8,border:'none',fontSize:isMobile?12:13,fontWeight:'bold',cursor:'pointer'};
  const smallBtn={padding:isMobile?'7px 10px':'8px 12px',borderRadius:9,border:'1px solid #333',fontSize:isMobile?12:13,fontWeight:'bold'};

  return e('div',{style:{width:'100%',height:'100%',display:'grid',placeItems:'center',padding:12,overflow:'hidden'}},
    e('div',{style:{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:isMobile?6:8,overflow:'hidden'}},
      e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',flex:'0 0 auto'}},
        ...[['real','🕐 Real'],['manual','✏️ Set'],['free','▶ Free']].map(([m,lb])=>e('button',{key:m,onClick:()=>sw(m),style:{...topBtn,background:mode===m?'#c0186a':'#2a2a3e',color:mode===m?'#fff':'#999'}},lb)),
        e('button',{onClick:()=>setSnd(s=>!s),style:{...topBtn,background:snd?'#2a3a2a':'#3a2a2a'}},snd?'🔊':'🔇')
      ),

      mode==='manual'&&e('div',{style:{display:'flex',gap:6,alignItems:'flex-end',background:'#2a2a3e',padding:isMobile?'6px 8px':'8px 10px',borderRadius:12,flex:'0 0 auto'}},
        ...[['H',mH,setMH,24],['M',mM,setMM,60],['S',mS,setMS,60]].map(([lb,v,set,mx])=>e('div',{key:lb,style:{display:'flex',flexDirection:'column',alignItems:'center'}},
          e('span',{style:{fontSize:10,color:'#999',marginBottom:2}},lb),
          e('input',{type:'number',min:0,max:mx-1,value:v,onChange:ev=>set(ev.target.value),style:{width:isMobile?36:40,textAlign:'center',fontSize:isMobile?14:15,fontWeight:'bold',background:'#111',color:'#fff',border:'1px solid #444',borderRadius:6,padding:'3px 2px'}})
        )),
        e('button',{onClick:apply,style:{...topBtn,background:'#444',color:'#fff'}},'SET')
      ),

      e('div',{style:{background:'#0a0a12',border:'1px solid #333',borderRadius:14,padding:isMobile?'6px 14px':'8px 18px',textAlign:'center',flex:'0 0 auto'}},
        e('div',{style:{fontSize:isMobile?9:10,color:'#555',letterSpacing:2,marginBottom:2}},(mode==='real'?'REAL TIME':mode==='manual'?'MANUAL':'FREE RUN')+' · '+(isDay?'☀ DAY':'☾ NIGHT')),
        e('div',{style:{fontSize:isMobile?30:42,fontWeight:'bold',letterSpacing:isMobile?2:4,fontFamily:'monospace',lineHeight:1}},
          e('span',{style:{color:'#f0a000'}},pad(hr)),e('span',{style:{color:'#444'}},':'),
          e('span',{style:{color:'#1a6aff'}},pad(min)),e('span',{style:{color:'#444'}},':'),
          e('span',{style:{color:'#c0186a'}},pad(sec))
        )
      ),

      e('div',{style:{fontSize:isMobile?10:12,color:'#9aa',letterSpacing:1.5,flex:'0 0 auto',textTransform:'uppercase'}},'Hours · Minutes · Seconds'),

      e('div',{style:{flex:'0 1 auto',display:'flex',alignItems:'center',justifyContent:'center',maxWidth:'100%',maxHeight:'100%',overflow:'hidden',background:'#fff',border:'1px solid #ddd',borderRadius:isMobile?16:20,padding:3}},
        e('svg',{viewBox:`0 0 ${W} ${W}`,width:dim,height:dim,style:{display:'block',maxWidth:'100%',maxHeight:'100%'}},
          e('circle',{cx:CX,cy:CY,r:rBg,fill:'#f8f6f0'}),
          e('path',{d:`M${CX},${CY} L${x6},${y6} A${rBg},${rBg},0,1,1,${x18},${y18} Z`,fill:'#ddeeff',opacity:.4}),
          e('line',{x1:x6,y1:y6,x2:x18,y2:y18,stroke:'#ccc',strokeWidth:.7,strokeDasharray:'3,3'}),
          e('text',{x:CX-52*scale,y:CY,textAnchor:'middle',dominantBaseline:'middle',fontSize:Math.max(6,6.5*scale),fill:'#ccc'},'NIGHT'),
          e('text',{x:CX+52*scale,y:CY,textAnchor:'middle',dominantBaseline:'middle',fontSize:Math.max(6,6.5*scale),fill:'#99aacc'},'DAY'),
          ...Array.from({length:60},(_,s)=>{const rad=tr(gd(s,S)),major=s%5===0,r1=RS+SZ+2*scale,r2=r1-(major?10:5)*scale;return e('line',{key:s,x1:CX+r1*Math.cos(rad),y1:CY+r1*Math.sin(rad),x2:CX+r2*Math.cos(rad),y2:CY+r2*Math.sin(rad),stroke:s===sec?'#c0186a':major?'#bbb':'#ddd',strokeWidth:s===sec?Math.max(1,2*scale):major?Math.max(.8,1.1*scale):Math.max(.4,.6*scale)});}),
          ...Array.from({length:24},(_,h)=>{const rad=tr(180+h*15),major=h%6===0,lr=(RS+SZ+2*scale)+(major?14:9)*scale,x=Math.max(10,Math.min(W-10,CX+lr*Math.cos(rad))),y=Math.max(10,Math.min(W-10,CY+lr*Math.sin(rad)));return e('text',{key:h,x,y,textAnchor:'middle',dominantBaseline:'middle',fontSize:major?Math.max(7,10*scale):Math.max(5,6*scale),fontWeight:major?'bold':'normal',fill:major?(h<6||h>=18?'#5577bb':'#bb8800'):'#ccc'},pad(h));}),
          e('line',{x1:CX,y1:CY,x2:CX+(RH-SZ-4*scale)*Math.cos(hA),y2:CY+(RH-SZ-4*scale)*Math.sin(hA),stroke:'#f0a000',strokeWidth:Math.max(1,2.4*scale)}),
          e('line',{x1:CX,y1:CY,x2:CX+(RM-SZ-4*scale)*Math.cos(mA),y2:CY+(RM-SZ-4*scale)*Math.sin(mA),stroke:'#1a6aff',strokeWidth:Math.max(1,2*scale)}),
          e('line',{x1:CX,y1:CY,x2:CX+(RS-SZ-4*scale)*Math.cos(sA),y2:CY+(RS-SZ-4*scale)*Math.sin(sA),stroke:'#c0186a',strokeWidth:Math.max(1,2.2*scale)}),
          e('circle',{cx:CX,cy:CY,r:Math.max(3,5*scale),fill:'#222'}),
          e(Ring,{n:H,R:RH,bl:hb,aL:hL,aR:hR,col:'#f0a000',fA:'#fff8e0',sp:0,sr:0,sL:-1,sR:-1,nums:false,CX,CY,scale}),
          e(Ring,{n:M,R:RM,bl:mb,aL:mL,aR:mR,col:'#1a6aff',fA:'#ddeeff',sp:0,sr:0,sL:-1,sR:-1,nums:false,CX,CY,scale}),
          e(Ring,{n:S,R:RS,bl:sb,aL:sL,aR:sR,col:'#c0186a',fA:'#ffe0ef',sp,sr,sL,sR,nums:true,CX,CY,scale})
        )
      ),

      mode==='free'&&e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',flex:'0 0 auto'}},
        ...[
          {lb:'◀',fn:()=>{stop();setSt(p=>build(Math.max(0,p.total-1)));},dis:run},
          {lb:run?'⏸ STOP':'▶ START',fn:tog,bg:run?'#c0186a':'#1a7a3a',cl:'#fff'},
          {lb:'▶',fn:()=>{if(!run)setSt(p=>build(p.total+1));},dis:run},
          {lb:'↺',fn:()=>{stop();setSt(build(0));}}
        ].map((b,i)=>e('button',{key:i,onClick:b.fn,disabled:b.dis,style:{...smallBtn,background:b.dis?'#111':b.bg||'#2a2a3e',color:b.dis?'#444':b.cl||'#aaa',cursor:b.dis?'default':'pointer'}},b.lb))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('R')).render(e(App));
</script>
</body>
</html>
