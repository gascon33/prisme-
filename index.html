<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prism Clock</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#1a1a2e;font-family:sans-serif}input::-webkit-inner-spin-button{-webkit-appearance:none}</style>
</head>
<body>
<div id="R"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const{useState,useEffect,useRef}=React;
const S=60,M=60,H=24,SZ=10,RS=152,RM=118,RH=84,W=380,CX=190,CY=195;
const gd=(s,n)=>180+(s%n)*(360/n);
const td=(i,n)=>180+i*(360/n)-(360/n)/2;
const tr=d=>d*Math.PI/180;
const pad=n=>String(n).padStart(2,"0");
function iB(n){const b=Array(n).fill(0);b[0]=1;b[1]=2;return b;}
function sB(bl,p,n){const nx=[...bl];for(let o=0;o<3;o++){const i=(p+o)%n;nx[i]=(nx[i]+2)%3;}return nx;}
function build(total){
  const sec=total%60,min=Math.floor(total/60)%60,hr=Math.floor(total/3600)%24;
  function ring(k,N){let b=iB(N);for(let i=0;i<k%N;i++)b=sB(b,i,N);return b;}
  return{total,sec,min,hr,sB:ring(sec,S),mB:ring(min,M),hB:ring(hr,H)};
}
function getNow(){const d=new Date();return d.getHours()*3600+d.getMinutes()*60+d.getSeconds();}
function playTick(ctx,t,isM){
  const sr=ctx.sampleRate;
  [{l:.04,d:.008,v:isM?1:.7,g:.6,f:0,dt:0},{l:.035,d:.006,v:isM?.8:.5,g:.4,f:isM?2200:1800,dt:.04}]
  .forEach(({l,d,v,g,f,dt})=>{
    const buf=ctx.createBuffer(1,sr*l,sr),ch=buf.getChannelData(0);
    for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1)*Math.exp(-i/(sr*d))*v;
    const src=ctx.createBufferSource();src.buffer=buf;
    const gn=ctx.createGain();gn.gain.value=g;
    if(f){const fl=ctx.createBiquadFilter();fl.type="lowpass";fl.frequency.value=f;src.connect(fl);fl.connect(gn);}
    else src.connect(gn);
    gn.connect(ctx.destination);src.start(t+dt);
  });
}
function verts(tx,ty,deg){
  const a=tr(deg),ap=[tx+SZ*Math.cos(a),ty+SZ*Math.sin(a)];
  const bx=tx-SZ*.5*Math.cos(a),by=ty-SZ*.5*Math.sin(a);
  const px=Math.cos(a+Math.PI/2),py=Math.sin(a+Math.PI/2),hw=SZ*Math.sqrt(3)/2;
  return[ap,[bx+hw*px,by+hw*py],[bx-hw*px,by-hw*py]];
}
function Ring({n,R,bl,aL,aR,col,fA,sp,sr,sL,sR,nums}){
  const els=[];
  for(let i=0;i<n;i++){
    const isA=i===aL||i===aR,base=td(i,n);
    let deg=base;
    if(sp===1&&i===sL)deg=base+sr;
    if(sp===2&&i===sR)deg=base+sr;
    const rad=tr(base),tx=CX+R*Math.cos(rad),ty=CY+R*Math.sin(rad);
    const v=verts(tx,ty,deg),poly=v.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
    const idx=bl[i],b1=idx===0?v[1]:v[0],b2=idx===0?v[2]:idx===1?v[1]:v[2];
    const lx=(v[0][0]+v[1][0]+v[2][0])/3,ly=(v[0][1]+v[1][1]+v[2][1])/3;
    els.push(
      React.createElement("g",{key:i},
        React.createElement("polygon",{points:poly,fill:isA?fA:"#f2f2f2",stroke:isA?col:"#bbb",strokeWidth:isA?1.4:.6}),
        React.createElement("line",{x1:b1[0],y1:b1[1],x2:b2[0],y2:b2[1],stroke:isA?col:"#777",strokeWidth:isA?2.8:1.6,strokeLinecap:"round"}),
        nums&&React.createElement("text",{x:lx,y:ly+.3,textAnchor:"middle",dominantBaseline:"middle",fontSize:4,fill:isA?col:"#bbb",fontWeight:isA?"bold":"normal"},i+1)
      )
    );
  }
  return els;
}
const HL=Array.from({length:24},(_,h)=>({h,rad:tr(180+h*15),major:h%6===0}));
const ST=Array.from({length:60},(_,s)=>({s,rad:tr(gd(s,S)),major:s%5===0}));

function App(){
const[mode,setMode]=useState(“real”);
const[st,setSt]=useState(()=>build(getNow()));
const[sp,setSp]=useState(0);
const[sr,setSr]=useState(0);
const[mH,setMH]=useState(“12”);
const[mM,setMM]=useState(“00”);
const[mS,setMS]=useState(“00”);
const[run,setRun]=useState(false);
const[snd,setSnd]=useState(true);
const spR=useRef(null),tmR=useRef(null),psR=useRef(-1),acR=useRef(null),snR=useRef(true);
useEffect(()=>{snR.current=snd;},[snd]);
function getAC(){
if(!acR.current||acR.current.state===“closed”)acR.current=new(window.AudioContext||window.webkitAudioContext)();
if(acR.current.state===“suspended”)acR.current.resume();
return acR.current;
}
function pt(isM){if(!snR.current)return;try{const c=getAC();playTick(c,c.currentTime,isM);}catch(e){}}
function spin(getT){
cancelAnimationFrame(spR.current);
const next=getT();pt(next%60===0);
setSp(1);setSr(0);let t0=null;
const p1=ts=>{
if(!t0)t0=ts;const t=Math.min((ts-t0)/300,1);setSr(t*120);
if(t<1){spR.current=requestAnimationFrame(p1);return;}
setSp(2);setSr(0);let t1=null;
const p2=ts2=>{
if(!t1)t1=ts2;const t2=Math.min((ts2-t1)/300,1);setSr(t2*120);
if(t2<1){spR.current=requestAnimationFrame(p2);return;}
setSp(0);setSr(0);setSt(build(next));
};
spR.current=requestAnimationFrame(p2);
};
spR.current=requestAnimationFrame(p1);
}
useEffect(()=>{
if(mode!==“real”)return;
psR.current=-1;
const id=setInterval(()=>{const t=getNow(),s=t%60;if(s!==psR.current){psR.current=s;spin(()=>getNow());}},200);
return()=>{clearInterval(id);cancelAnimationFrame(spR.current);setSp(0);};
},[mode]);
function stop(){clearTimeout(tmR.current);cancelAnimationFrame(spR.current);setSp(0);setSr(0);setRun(false);}
function start(from){
setRun(true);let cur=from;const w0=Date.now();
function loop(){const el=Date.now()-w0,dl=(Math.floor(el/1000)+1)*1000-el;tmR.current=setTimeout(()=>{cur++;spin(()=>cur);loop();},dl);}
loop();
}
function apply(){
stop();
const h=Math.min(23,Math.max(0,parseInt(mH)||0));
const m=Math.min(59,Math.max(0,parseInt(mM)||0));
const s=Math.min(59,Math.max(0,parseInt(mS)||0));
setSt(build(h*3600+m*60+s));
}
function tog(){if(run)stop();else start(st.total);}
function sw(m){stop();setMode(m);if(m===“real”)setSt(build(getNow()));}
useEffect(()=>()=>{clearTimeout(tmR.current);cancelAnimationFrame(spR.current);},[]);

const{sec,min,hr,sB:sb,mB:mb,hB:hb}=st;
const sL=sec,sR=(sec+1)%S,mL=min,mR=(min+1)%M,hL=hr,hR=(hr+1)%H;
const sA=tr(gd(sec,S)),mA=tr(gd(min,M)),hA=tr(gd(hr,H));
const isDay=hr>=6&&hr<18,rBg=RS+SZ+12;
const x6=CX+rBg*Math.cos(tr(270)),y6=CY+rBg*Math.sin(tr(270));
const x18=CX+rBg*Math.cos(tr(90)),y18=CY+rBg*Math.sin(tr(90));
const e=React.createElement;
return e(“div”,{style:{background:”#1a1a2e”,minHeight:“100vh”,display:“flex”,flexDirection:“column”,alignItems:“center”,padding:“8px 4px”}},
e(“div”,{style:{display:“flex”,gap:6,marginBottom:6,alignItems:“center”}},
…[[“real”,“🕐 Real”],[“manual”,“✏️ Set”],[“free”,“▶ Free”]].map(([m,lb])=>
e(“button”,{key:m,onClick:()=>sw(m),style:{padding:“5px 10px”,borderRadius:8,border:“none”,fontSize:11,fontWeight:“bold”,background:mode===m?”#c0186a”:”#2a2a3e”,color:mode===m?“white”:”#888”,cursor:“pointer”}},lb)
),
e(“button”,{onClick:()=>setSnd(s=>!s),style:{padding:“5px 8px”,borderRadius:8,border:“none”,fontSize:14,background:snd?”#2a3a2a”:”#3a2a2a”,cursor:“pointer”}},snd?“🔊”:“🔇”)
),
mode===“manual”&&e(“div”,{style:{background:”#2a2a3e”,borderRadius:12,padding:“8px 12px”,marginBottom:6}},
e(“div”,{style:{display:“flex”,gap:6,alignItems:“center”,marginBottom:6}},
…[[“H”,mH,setMH,24],[“M”,mM,setMM,60],[“S”,mS,setMS,60]].map(([lb,v,set,mx])=>
e(“div”,{key:lb,style:{display:“flex”,flexDirection:“column”,alignItems:“center”}},
e(“span”,{style:{fontSize:9,color:”#888”,marginBottom:2}},lb),
e(“input”,{type:“number”,min:0,max:mx-1,value:v,onChange:ev=>set(ev.target.value),style:{width:42,textAlign:“center”,fontSize:16,fontWeight:“bold”,background:”#111”,color:“white”,border:“1px solid #444”,borderRadius:6,padding:“3px 2px”}})
)
),
e(“button”,{onClick:apply,style:{padding:“7px 12px”,borderRadius:8,background:”#444”,color:“white”,border:“none”,fontWeight:“bold”,fontSize:12,cursor:“pointer”,marginTop:10}},“SET”)
),
e(“button”,{onClick:tog,style:{width:“100%”,padding:“8px”,borderRadius:9,border:“none”,fontWeight:“bold”,fontSize:14,cursor:“pointer”,background:run?”#c0186a”:”#1a7a3a”,color:“white”}},run?“⏸ STOP”:“▶ START”)
),
e(“div”,{style:{background:”#0a0a12”,border:“1px solid #333”,borderRadius:12,padding:“6px 20px”,marginBottom:6,textAlign:“center”,minWidth:220}},
e(“div”,{style:{fontSize:9,color:”#555”,letterSpacing:2,marginBottom:2}},
(mode===“real”?“REAL TIME”:mode===“manual”?“MANUAL”:“FREE RUN”)+” · “+(isDay?“☀ DAY”:“☾ NIGHT”),
mode!==“real”&&e(“span”,{style:{color:run?”#4f4”:”#f44”,marginLeft:6}},run?“● RUN”:“■ STOP”)
),
e(“div”,{style:{fontSize:34,fontWeight:“bold”,letterSpacing:4,fontFamily:“monospace”}},
e(“span”,{style:{color:”#f0a000”}},pad(hr)),e(“span”,{style:{color:”#444”}},”:”),
e(“span”,{style:{color:”#1a6aff”}},pad(min)),e(“span”,{style:{color:”#444”}},”:”),
e(“span”,{style:{color:”#c0186a”}},pad(sec))
),
e(“div”,{style:{fontSize:8,color:”#333”}},“🟡”+( hL+1)+”&”+(hR+1)+” 🔵”+(mL+1)+”&”+(mR+1)+” 🔴”+(sL+1)+”&”+(sR+1))
),
e(“div”,{style:{background:“white”,border:“1px solid #ddd”,borderRadius:16,padding:3,marginBottom:6}},
e(“svg”,{width:W,height:W,viewBox:“0 0 “+W+” “+W,style:{display:“block”,maxWidth:“96vw”,height:“auto”}},
e(“circle”,{cx:CX,cy:CY,r:rBg,fill:”#f8f6f0”}),
e(“path”,{d:“M”+CX+”,”+CY+” L”+x6+”,”+y6+” A”+rBg+”,”+rBg+”,0,1,1,”+x18+”,”+y18+” Z”,fill:”#ddeeff”,opacity:.4}),
e(“line”,{x1:x6,y1:y6,x2:x18,y2:y18,stroke:”#ccc”,strokeWidth:.7,strokeDasharray:“3,3”}),
e(“text”,{x:CX-52,y:CY,textAnchor:“middle”,dominantBaseline:“middle”,fontSize:6.5,fill:”#ccc”},“NIGHT”),
e(“text”,{x:CX+52,y:CY,textAnchor:“middle”,dominantBaseline:“middle”,fontSize:6.5,fill:”#99aacc”},“DAY”),
…ST.map(t=>e(“line”,{key:t.s,x1:CX+(RS+SZ+2)*Math.cos(t.rad),y1:CY+(RS+SZ+2)*Math.sin(t.rad),x2:CX+(RS+SZ+2-(t.major?10:5))*Math.cos(t.rad),y2:CY+(RS+SZ+2-(t.major?10:5))*Math.sin(t.rad),stroke:t.s===sec?”#c0186a”:t.major?”#bbb”:”#ddd”,strokeWidth:t.s===sec?2.5:t.major?1.2:.6})),
…HL.map(({h,rad,major})=>{
const lr=(RS+SZ+2)+(major?14:9),x=Math.max(10,Math.min(W-10,CX+lr*Math.cos(rad))),y=Math.max(10,Math.min(W-10,CY+lr*Math.sin(rad)));
return e(“text”,{key:h,x,y,textAnchor:“middle”,dominantBaseline:“middle”,fontSize:major?10:6,fontWeight:major?“bold”:“normal”,fill:major?(h<6||h>=18?”#5577bb”:”#bb8800”):”#ccc”},pad(h));
}),
e(“line”,{x1:CX,y1:CY,x2:CX+(RH-SZ-4)*Math.cos(hA),y2:CY+(RH-SZ-4)*Math.sin(hA),stroke:”#f0a000”,strokeWidth:2.5}),
e(“line”,{x1:CX,y1:CY,x2:CX+(RM-SZ-4)*Math.cos(mA),y2:CY+(RM-SZ-4)*Math.sin(mA),stroke:”#1a6aff”,strokeWidth:2}),
e(“line”,{x1:CX,y1:CY,x2:CX+(RS-SZ-4)*Math.cos(sA),y2:CY+(RS-SZ-4)*Math.sin(sA),stroke:”#c0186a”,strokeWidth:2.2}),
e(“circle”,{cx:CX,cy:CY,r:5,fill:”#222”}),
e(Ring,{n:H,R:RH,bl:hb,aL:hL,aR:hR,col:”#f0a000”,fA:”#fff8e0”,sp:0,sr:0,sL:-1,sR:-1,nums:false}),
e(Ring,{n:M,R:RM,bl:mb,aL:mL,aR:mR,col:”#1a6aff”,fA:”#ddeeff”,sp:0,sr:0,sL:-1,sR:-1,nums:false}),
e(Ring,{n:S,R:RS,bl:sb,aL:sL,aR:sR,col:”#c0186a”,fA:”#ffe0ef”,sp,sr,sL,sR,nums:true})
)
),
mode===“free”&&e(“div”,{style:{display:“flex”,gap:7}},
…[
{lb:“◀”,fn:()=>{stop();setSt(p=>build(Math.max(0,p.total-1)));},dis:run},
{lb:run?“⏸ STOP”:“▶ START”,fn:tog,bg:run?”#c0186a”:”#1a7a3a”,cl:“white”},
{lb:“▶”,fn:()=>{if(!run)setSt(p=>build(p.total+1));},dis:run},
{lb:“↺”,fn:()=>{stop();setSt(build(0));}},
].map((b,i)=>e(“button”,{key:i,onClick:b.fn,disabled:b.dis,style:{padding:“9px 13px”,borderRadius:9,border:“1px solid #333”,background:b.dis?”#111”:b.bg||”#2a2a3e”,color:b.dis?”#444”:b.cl||”#aaa”,cursor:b.dis?“default”:“pointer”,fontSize:13,fontWeight:“bold”}},b.lb))
)
);
}
ReactDOM.createRoot(document.getElementById(“R”)).render(React.createElement(App));
</script>

</body>
</html>
